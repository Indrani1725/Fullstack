<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Management System</title>
    <meta charset="UTF-8"/>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
            background-color: #f4f7f6;
        }
        h2 {
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .add-btn {
            display: inline-block;
            background-color: #28a745;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .add-btn:hover {
            background-color: #218838;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        th {
            background-color: #007bff;
            color: white;
            text-align: left;
            padding: 12px;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            color: #555;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .btn-edit {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
            margin-right: 10px;
        }
        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-delete:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

    <h2>Student Management Dashboard</h2>

    <a th:href="@{/students/new}" class="add-btn">+ Add New Student</a>

    <table>
        <thead>
            <tr>
                <th>student_id</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="s, sStat : ${students}">
                <td th:text="${sStat.index + 1}"></td>
                <td th:text="${s.name}" style="font-weight: bold; color: #333;"></td>
                <td th:text="${s.email}"></td>
                <td><span th:text="${s.department}" style="background: #e9ecef; padding: 4px 8px; border-radius: 4px;"></span></td>
                <td>
                    <a th:href="@{/students/{id}/edit(id=${s.id})}" class="btn-edit">Edit</a>
                    <form th:action="@{/students/{id}/delete(id=${s.id})}" method="post" style="display:inline;">
                        <button type="submit" class="btn-delete" onclick="return confirm('Are you sure you want to delete this student?')">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
